language: bash

tasks:
  dev:
    script: watchexec -r -e go -w . -w ../../packages/adapter -- "go build -o ../../bin/gmux$(go env GOEXE) ./cmd/gmux && exec ../../bin/gmux$(go env GOEXE) pi"
    preset: server
  build:
    script: go build -o ../../bin/gmux$(go env GOEXE) ./cmd/gmux
    inputs:
      - "cmd/**/*"
      - "internal/**/*"
      - "go.mod"
      - "/packages/adapter/**/*.go"
  test:
    command: go test ./...
  lint:
    command: go vet ./...
